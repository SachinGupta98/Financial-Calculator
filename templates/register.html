<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinPal - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-bgmain font-sans text-gray-300 antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Animated Blobs -->
    <div class="fixed inset-0 min-h-screen w-full overflow-hidden pointer-events-none z-[-1]">
        <div class="absolute bottom-[20%] right-[-10%] w-[500px] h-[500px] bg-accent rounded-full mix-blend-screen filter blur-[128px] opacity-20 animate-blob"></div>
        <div class="absolute top-[20%] left-[-10%] w-96 h-96 bg-primary rounded-full mix-blend-screen filter blur-[128px] opacity-20 animate-blob animation-delay-2000"></div>
    </div>

    <div class="w-full max-w-md p-8 relative z-10">
        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary to-purple-600 flex items-center justify-center shadow-lg shadow-primary/30">
                <i data-lucide="wallet" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 tracking-tight">Fin<span class="text-primary">Pal</span></h1>
        </div>

        <div class="bg-cardbg/80 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-2 text-center">Create Account</h2>
            <p class="text-gray-400 text-sm mb-6 text-center">Start your journey to financial freedom.</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="p-3 mb-4 text-sm rounded-lg {% if category == 'danger' %}bg-red-900/50 text-red-200 border border-red-500/30{% else %}bg-green-900/50 text-green-200 border border-green-500/30{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                    <div class="relative">
                        <i data-lucide="user" class="w-5 h-5 text-gray-500 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
                        <input type="text" name="username" required class="w-full bg-slate-900/50 border border-gray-700 text-white rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-primary transition-colors focus:ring-1 focus:ring-primary" placeholder="johndoe">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="w-5 h-5 text-gray-500 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
                        <input type="email" name="email" required class="w-full bg-slate-900/50 border border-gray-700 text-white rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-primary transition-colors focus:ring-1 focus:ring-primary" placeholder="you@example.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="w-5 h-5 text-gray-500 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
                        <input type="password" name="password" required minlength="6" class="w-full bg-slate-900/50 border border-gray-700 text-white rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-primary transition-colors focus:ring-1 focus:ring-primary" placeholder="••••••••">
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-accent to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 py-3 rounded-xl font-bold text-white shadow-lg shadow-accent/30 mt-6 relative overflow-hidden group transition-all">
                    <span class="relative z-10 flex items-center justify-center">Create Account <i data-lucide="check-circle" class="w-4 h-4 ml-2"></i></span>
                </button>
            </form>
            
            <p class="text-center text-gray-400 text-sm mt-6">
                Already have an account? <a href="{{ url_for('login') }}" class="text-accent hover:text-white transition-colors font-medium">Log in</a>
            </p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
