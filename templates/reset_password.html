<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinFlap - Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body
    class="bg-bgmain font-sans text-gray-300 antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Animated Blobs -->
    <div class="fixed inset-0 min-h-screen w-full overflow-hidden pointer-events-none z-[-1]">
        <div
            class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary rounded-full mix-blend-screen filter blur-[128px] opacity-30 animate-blob">
        </div>
        <div
            class="absolute top-[20%] right-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[128px] opacity-30 animate-blob animation-delay-2000">
        </div>
    </div>

    <div class="w-full max-w-md p-8 relative z-10">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-3 mb-8">
            <div
                class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary to-purple-600 flex items-center justify-center shadow-lg shadow-primary/30">
                <i data-lucide="wallet" class="w-6 h-6 text-white"></i>
            </div>
            <h1
                class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 tracking-tight">
                Fin<span class="text-primary">Flap</span></h1>
        </div>

        <div class="bg-cardbg/80 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl">
            <!-- Icon + Heading -->
            <div class="flex flex-col items-center mb-6">
                <div
                    class="w-16 h-16 rounded-2xl bg-green-500/20 border border-green-500/30 flex items-center justify-center mb-4">
                    <i data-lucide="lock-keyhole" class="w-8 h-8 text-green-400"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Set New Password</h2>
                <p class="text-gray-400 text-sm mt-2 text-center">Choose a strong password — at least 6 characters.</p>
            </div>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div
                class="p-3 mb-4 text-sm rounded-lg {% if category == 'danger' %}bg-red-900/50 text-red-200 border border-red-500/30{% else %}bg-green-900/50 text-green-200 border border-green-500/30{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('reset_password', token=token) }}" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">New Password</label>
                    <div class="relative">
                        <i data-lucide="lock"
                            class="w-5 h-5 text-gray-500 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
                        <input type="password" name="password" id="pw1" required minlength="6"
                            class="w-full bg-slate-900/50 border border-gray-700 text-white rounded-xl pl-10 pr-12 py-3 focus:outline-none focus:border-primary transition-colors focus:ring-1 focus:ring-primary"
                            placeholder="••••••••">
                        <button type="button" onclick="togglePw('pw1','eye1')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                            <i data-lucide="eye" id="eye1" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Confirm New Password</label>
                    <div class="relative">
                        <i data-lucide="lock"
                            class="w-5 h-5 text-gray-500 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
                        <input type="password" name="confirm_password" id="pw2" required minlength="6"
                            class="w-full bg-slate-900/50 border border-gray-700 text-white rounded-xl pl-10 pr-12 py-3 focus:outline-none focus:border-primary transition-colors focus:ring-1 focus:ring-primary"
                            placeholder="••••••••">
                        <button type="button" onclick="togglePw('pw2','eye2')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                            <i data-lucide="eye" id="eye2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="btn-primary w-full py-3 rounded-xl font-bold text-white shadow-lg shadow-primary/30 mt-2 flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-4 h-4"></i>
                    Reset Password
                </button>
            </form>

            <p class="text-center text-gray-400 text-sm mt-6">
                <a href="{{ url_for('forgot_password') }}"
                    class="text-primary hover:text-white transition-colors font-medium">← Request new link</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function togglePw(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>

</html>
